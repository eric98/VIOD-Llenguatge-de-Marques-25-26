<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Exercici 5 - Pokémon Inicial</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Imatge del Pokémon seleccionat -->
    <img id="pokemon-img" 
         src="https://media.tenor.com/OPn74TiVetgAAAAe/pokemon-emerald-question-mark.png"
         alt="Pokémon seleccionat">

    <!-- Botons de selecció -->
    <div id="botons-container">
        <button class="poke-btn" data-pokemon="bulbasaur">
            <img src="./images/pokeball.png" alt="poke-bulbasaur">
        </button>

        <button class="poke-btn" data-pokemon="charmander">
            <img src="./images/pokeball.png" alt="poke-charmander">
        </button>

        <button class="poke-btn" data-pokemon="squirtle">
            <img src="./images/pokeball.png" alt="poke-squirtle">
        </button>
    </div>

    <!-- Bafarada de text -->
    <div id="bafarada">
        <p id="text">Oak: Here, take one of these rare Pokémon.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
